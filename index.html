<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Ang HUMSSay Ko!</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700;800;900&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/@lottiefiles/dotlottie-wc@0.7.1/dist/dotlottie-wc.js" type="module"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      /* Disable all text selection */
      -webkit-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
      user-select: none;
      /* Disable touch callout */
      -webkit-touch-callout: none;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #FFDA00;
      /* Disable touch actions */
      touch-action: none;
      /* Disable overscroll behavior */
      overscroll-behavior: none;
      /* Disable pull to refresh */
      -webkit-overflow-scrolling: none;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      /* Disable pointer events for entire body initially, then enable for content */
      pointer-events: none;
      /* Disable context menu */
      -webkit-tap-highlight-color: transparent;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: clamp(10px, 3vmin, 30px);
      width: 90%;
      max-width: 90vmin;
      padding: clamp(10px, 3vmin, 30px);
      height: 100%;
      max-height: 100vh;
    }

    .lottie-wrapper {
      width: clamp(200px, 65vmin, 600px);
      height: clamp(200px, 65vmin, 600px);
      flex-shrink: 0;
      opacity: 0;
      animation: fadeIn 1.5s ease-out 0.3s forwards;
    }

    dotlottie-wc {
      width: 100%;
      height: 100%;
      display: block;
    }

    .title {
      font-family: 'Poppins', sans-serif;
      font-size: clamp(1.5rem, 8vmin, 5rem);
      font-weight: 700;
      font-style: normal;
      text-align: center;
      white-space: nowrap;
      flex-shrink: 0;
      /* Animated gradient text */
      background: linear-gradient(
        90deg,
        #000000 0%,
        #ffb800 20%,
        #ff9500 40%,
        #000000 60%,
        #ffdc00 80%,
        #1c1c1c 100%
      );
      background-size: 300% 100%;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      animation:
        fadeInUp 1.2s ease-out 0.6s forwards,
        gradientShift 6s ease-in-out infinite alternate;
      opacity: 0;
      transform: translateY(30px);
      text-shadow: none;
      letter-spacing: 1px;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes gradientShift {
      0% {
        background-position: 0% 50%;
      }
      100% {
        background-position: 100% 50%;
      }
    }
  </style>
</head>
<body ondragstart="return false" oncontextmenu="return false">
  <div class="container">
    <div class="lottie-wrapper">
      <dotlottie-wc
        src="https://lottie.host/50d276e8-7ab6-4e7d-a5b4-3bb7550b358b/d0S76TtfDh.lottie"
        speed="1"
        mode="forward"
        loop
        autoplay
      ></dotlottie-wc>
    </div>
    <h1 class="title">Coming Soon...</h1>
  </div>

  <script>
    // Disable all keyboard shortcuts
    document.addEventListener('keydown', function(e) {
      e.preventDefault();
      return false;
    }, { passive: false });

    // Disable scroll
    document.addEventListener('scroll', function(e) {
      e.preventDefault();
      window.scrollTo(0, 0);
    }, { passive: false });

    // Disable wheel/scroll events
    document.addEventListener('wheel', function(e) {
      e.preventDefault();
    }, { passive: false });

    // Disable touch events
    document.addEventListener('touchstart', function(e) {
      e.preventDefault();
    }, { passive: false });

    document.addEventListener('touchmove', function(e) {
      e.preventDefault();
    }, { passive: false });

    document.addEventListener('touchend', function(e) {
      e.preventDefault();
    }, { passive: false });

    // Disable mouse events
    document.addEventListener('mousedown', function(e) {
      e.preventDefault();
    }, { passive: false });

    document.addEventListener('click', function(e) {
      e.preventDefault();
    }, { passive: false });

    document.addEventListener('dblclick', function(e) {
      e.preventDefault();
    }, { passive: false });

    // Disable drag events
    document.addEventListener('dragstart', function(e) {
      e.preventDefault();
    }, { passive: false });

    // Disable pinch zoom on mobile
    document.addEventListener('gesturestart', function(e) {
      e.preventDefault();
    }, { passive: false });

    document.addEventListener('gesturechange', function(e) {
      e.preventDefault();
    }, { passive: false });

    document.addEventListener('gestureend', function(e) {
      e.preventDefault();
    }, { passive: false });
  </script>
</body>
</html>
