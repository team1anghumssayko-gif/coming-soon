<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Universal Yellow</title>
    
    <script src="https://unpkg.com/@lottiefiles/dotlottie-wc@0.7.1/dist/dotlottie-wc.js" type="module" defer></script>

    <style>
        /* Force height for mobile browsers */
        html, body {
            height: 100%;
            width: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        body {
            background-color: #FFDA00;
            display: flex;
            justify-content: center;
            align-items: center;
            
            /* Animation */
            animation: fadeIn ease 1.2s forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Responsive container */
        .graphic-container {
            width: 300px;
            height: 300px;
            display: block;
        }
    </style>
</head>
<body>

    <div class="graphic-container">
        <dotlottie-wc 
            src="https://lottie.host/50d276e8-7ab6-4e7d-a5b4-3bb7550b358b/d0S76TtfDh.lottie" 
            speed="1" 
            width="300"
            height="300"
            mode="forward" 
            loop 
            autoplay>
        </dotlottie-wc>
    </div>

</body>
</html>
